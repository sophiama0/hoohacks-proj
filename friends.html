<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0, user-scalable=no">
  <title>Rally — Friends &amp; Status</title>
  <link rel="stylesheet" href="css/shared.css">
  <style>
    /* Toast sits below the taller header on this page */
    .toast{top:140px;}

    .header-top{margin-bottom:10px;}
    .search-bar{background:var(--surface);border:1px solid var(--border);border-radius:12px;padding:10px 14px;display:flex;align-items:center;gap:9px;color:var(--text-muted);font-size:14px;}
    .content{position:absolute;top:132px;bottom:0;left:0;right:0;overflow-y:auto;padding:14px 14px 20px;display:flex;flex-direction:column;gap:10px;}

    /* Friend cards */
    .card{background:var(--surface);border:1px solid var(--border);border-radius:18px;padding:14px;transition:all 0.2s;}
    .card.danger{border-color:rgba(239,68,68,0.4);background:rgba(239,68,68,0.07);animation:cardglow 2s ease-in-out infinite;}
    .card.warn{border-color:rgba(245,158,11,0.35);background:rgba(245,158,11,0.05);}
    @keyframes cardglow{0%,100%{box-shadow:0 0 0 rgba(239,68,68,0);}50%{box-shadow:0 0 20px rgba(239,68,68,0.18);}}
    .card-top{display:flex;gap:12px;}
    .av{width:48px;height:48px;border-radius:50%;display:flex;align-items:center;justify-content:center;font-size:17px;font-weight:700;color:white;flex-shrink:0;position:relative;}
    .av-dot{width:11px;height:11px;border-radius:50%;position:absolute;bottom:0;right:0;border:2px solid var(--bg);}
    .card-body{flex:1;min-width:0;}
    .card-name{font-size:14px;font-weight:600;color:var(--text);}
    .card-loc{font-size:12px;color:var(--text-muted);margin-top:2px;white-space:nowrap;overflow:hidden;text-overflow:ellipsis;}
    .gait-row{margin-top:10px;display:flex;align-items:center;gap:8px;}
    .gait-bg{flex:1;height:5px;background:rgba(255,255,255,0.08);border-radius:3px;overflow:hidden;}
    .gait-fill{height:100%;border-radius:3px;transition:width 1.2s ease;}
    .gait-pct{font-size:12px;font-weight:700;width:30px;text-align:right;}
    .btns{display:flex;gap:6px;margin-top:10px;}
    .btn{flex:1;padding:8px 6px;border-radius:50px;border:1px solid var(--border);background:var(--surface);color:var(--text-muted);font-size:11px;font-weight:600;cursor:pointer;font-family:inherit;transition:all 0.2s;display:flex;align-items:center;justify-content:center;gap:4px;}
    .btn:hover{background:var(--surface2);color:var(--text);}
    .btn.red{background:rgba(239,68,68,0.13);border-color:rgba(239,68,68,0.35);color:#f87171;}
    .btn.blue{background:rgba(59,130,246,0.13);border-color:rgba(59,130,246,0.35);color:#60a5fa;}
    .card-right{display:flex;flex-direction:column;align-items:flex-end;gap:5px;flex-shrink:0;}
    .batt{font-size:11px;color:var(--text-muted);display:flex;align-items:center;gap:3px;}
    .batt.low{color:#f87171;}
    .status-tag{font-size:10px;font-weight:700;padding:3px 9px;border-radius:50px;}
    .live-badge{font-size:11px;font-weight:600;padding:3px 9px;border-radius:50px;background:rgba(16,185,129,0.12);color:#10b981;}
  </style>
</head>
<body>
<div id="app">
  <div class="header">
    <div class="header-top">
      <a class="back" href="index.html">‹ Back</a>
      <div class="header-title">Friends</div>
      <div class="live-badge">LIVE</div>
    </div>
    <div class="search-bar">🔍 <span style="color:var(--text-faint)">Search friends…</span></div>
  </div>

  <div class="content">
    <div class="section-label">⚠️ Needs Attention</div>
    <div id="alert-list"></div>
    <div class="section-label" style="margin-top:4px">✅ All Good</div>
    <div id="safe-list"></div>
  </div>

  <!-- Profile Modal -->
  <div class="modal-overlay" id="profile-modal">
    <div class="modal-sheet">
      <div class="mhandle"></div>
      <div style="display:flex;align-items:center;gap:14px;margin-bottom:16px">
        <div id="modal-av" style="width:56px;height:56px;border-radius:50%;display:flex;align-items:center;justify-content:center;font-size:20px;font-weight:700;color:white;flex-shrink:0"></div>
        <div>
          <div id="modal-name" style="font-size:18px;font-weight:700;color:var(--text)"></div>
          <div id="modal-loc" style="font-size:13px;color:var(--text-muted);margin-top:2px"></div>
        </div>
      </div>
      <div class="loc-box">
        <div style="display:flex;justify-content:space-between;margin-bottom:8px"><span style="font-size:12px;color:var(--text-muted)">Gait Index</span><span id="modal-gait" style="font-size:12px;font-weight:700"></span></div>
        <div style="height:6px;background:rgba(255,255,255,0.08);border-radius:3px;overflow:hidden;margin-bottom:10px"><div id="modal-gait-bar" style="height:100%;border-radius:3px;transition:width 0.5s"></div></div>
        <div style="display:flex;justify-content:space-between;margin-bottom:6px"><span style="font-size:12px;color:var(--text-muted)">Battery</span><span id="modal-batt" style="font-size:12px;font-weight:600;color:var(--text)"></span></div>
        <div style="display:flex;justify-content:space-between"><span style="font-size:12px;color:var(--text-muted)">Last seen</span><span style="font-size:12px;color:var(--text)">just now</span></div>
      </div>
      <button id="modal-checkin-btn" class="mbtn primary"></button>
      <button id="modal-alert-btn" class="mbtn danger-soft" style="display:none"></button>
      <button class="mbtn ghost" onclick="closeModal('profile-modal')">Close</button>
    </div>
  </div>

  <div class="toast" id="toastEl">
    <div id="tic" style="font-size:20px">✅</div>
    <div><div id="tt" style="font-size:13px;font-weight:600;color:var(--text)"></div><div id="ts" style="font-size:11px;color:var(--text-muted);margin-top:2px"></div></div>
  </div>
</div>

<script src="js/utils.js"></script>
<script>
const FRIENDS=[
  {id:'alex',  name:'Alex Chen',      ini:'AC',color:'#ef4444',gait:73,loc:"Near O'Neills Pub",   batt:24,lastSeen:'2 min ago'},
  {id:'jordan',name:'Jordan Kim',     ini:'JK',color:'#f59e0b',gait:87,loc:'Walking on Wertland St',batt:61,lastSeen:'just now'},
  {id:'maya',  name:'Maya Rodriguez', ini:'MR',color:'#10b981',gait:15,loc:'At Boylan Heights',    batt:88,lastSeen:'1 min ago'},
  {id:'sam',   name:'Sam Taylor',     ini:'ST',color:'#3b82f6',gait:41,loc:'Corner area',          batt:52,lastSeen:'just now'},
];

function gl(g){return g>=95?'🆘 Critical':g>=80?'⚠️ Concerning':g>=60?'👀 Heads up':g>=40?'📡 Monitoring':'✅ Normal';}

function render(){
  const al=document.getElementById('alert-list'), sl=document.getElementById('safe-list');
  al.innerHTML=''; sl.innerHTML='';
  [...FRIENDS].sort((a,b)=>b.gait-a.gait).forEach(f=>{
    const c=document.createElement('div');
    c.className='card '+(f.gait>=80?'danger':f.gait>=60?'warn':'');
    const gc_=gc(f.gait);
    c.innerHTML=`
      <div class="card-top">
        <div class="av" style="background:${f.color}">${f.ini}<div class="av-dot" style="background:${gc_}"></div></div>
        <div class="card-body">
          <div class="card-name">${f.name}</div>
          <div class="card-loc">📍 ${f.loc}</div>
          <div class="gait-row">
            <div class="gait-bg"><div class="gait-fill" style="width:${f.gait}%;background:${gc_}"></div></div>
            <div class="gait-pct" style="color:${gc_}">${f.gait}%</div>
          </div>
        </div>
        <div class="card-right">
          <div class="batt ${f.batt<20?'low':''}">${f.batt<20?'🪫':'🔋'} ${f.batt}%</div>
          <div style="font-size:10px;color:var(--text-faint)">${f.lastSeen}</div>
          <div class="status-tag" style="background:${gc_}22;color:${gc_}">${gl(f.gait)}</div>
        </div>
      </div>
      <div class="btns">
        <button class="btn" onclick="checkin('${f.id}')">✉️ Are you ok?</button>
        <button class="btn blue" onclick="openProfile('${f.id}')">👤 View</button>
        ${f.gait>=60?`<button class="btn red" onclick="alertGroup('${f.id}')">🚨 Alert group</button>`:''}
      </div>`;
    (f.gait>=60?al:sl).appendChild(c);
  });
}

function checkin(id){
  const f=FRIENDS.find(x=>x.id===id);
  toast('✉️',`Sent to ${f.name.split(' ')[0]}`,'"Are you okay?" notification delivered');
}
function alertGroup(id){
  const f=FRIENDS.find(x=>x.id===id);
  toast('🚨',`Alert for ${f.name.split(' ')[0]}`,'All friends have been notified to check on them');
}
function openProfile(id){
  const f=FRIENDS.find(x=>x.id===id);
  const gc_=gc(f.gait);
  document.getElementById('modal-av').style.background=f.color;
  document.getElementById('modal-av').textContent=f.ini;
  document.getElementById('modal-name').textContent=f.name;
  document.getElementById('modal-loc').textContent='📍 '+f.loc;
  document.getElementById('modal-gait').textContent=f.gait+'% — '+gl(f.gait);
  document.getElementById('modal-gait').style.color=gc_;
  document.getElementById('modal-gait-bar').style.width=f.gait+'%';
  document.getElementById('modal-gait-bar').style.background=gc_;
  document.getElementById('modal-batt').textContent=(f.batt<20?'🪫':'🔋')+' '+f.batt+'%';
  document.getElementById('modal-batt').style.color=f.batt<20?'#f87171':'var(--text)';
  const btn=document.getElementById('modal-checkin-btn');
  btn.textContent=`✉️ Send "Are you ok?" to ${f.name.split(' ')[0]}`;
  btn.onclick=()=>{closeModal('profile-modal');checkin(id);};
  const abtn=document.getElementById('modal-alert-btn');
  if(f.gait>=60){abtn.style.display='flex';abtn.textContent=`🚨 Alert group about ${f.name.split(' ')[0]}`;abtn.onclick=()=>{closeModal('profile-modal');alertGroup(id);};}
  else abtn.style.display='none';
  openModal('profile-modal');
}

render();
setInterval(()=>{
  FRIENDS.forEach(f=>{
    f.gait=Math.max(5,Math.min(99,Math.round(f.gait+(Math.random()-0.45)*4)));
    if(f.batt>5&&Math.random()<0.05) f.batt--;
  });
  render();
  const crit=FRIENDS.find(f=>f.gait>93);
  if(crit&&Math.random()<0.05) toast('🚨',`${crit.name.split(' ')[0]} needs help!`,'Gait critical — consider going to find them');
  const low=FRIENDS.find(f=>f.batt<20);
  if(low&&Math.random()<0.04) toast('🪫',`${low.name.split(' ')[0]}'s battery is low`,`${low.batt}% — they may go offline soon`);
},3000);

setTimeout(()=>toast('⚠️','Jordan Kim — 87% alert','Their gait is very irregular!'),1200);
</script>
</body>
</html>
