<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0, user-scalable=no">
  <title>Rally — Friends</title>
  <link rel="stylesheet" href="css/shared.css">
  <style>
    .toast{top:120px;}

    .header-top{margin-bottom:10px;}

    .header-actions{display:flex;gap:8px;align-items:center;}
    .add-btn{background:var(--accent);color:white;border:none;border-radius:50px;padding:7px 14px;font-size:13px;font-weight:600;cursor:pointer;font-family:inherit;display:flex;align-items:center;gap:5px;}
    .add-btn:active{opacity:0.85;}

    .search-bar{background:var(--surface);border:1px solid var(--border);border-radius:12px;padding:10px 14px;display:flex;align-items:center;gap:9px;font-size:14px;}
    .search-bar input{background:transparent;border:none;outline:none;color:var(--text);font-size:14px;font-family:inherit;flex:1;min-width:0;}
    .search-bar input::placeholder{color:var(--text-faint);}

    .content{position:absolute;top:130px;bottom:0;left:0;right:0;overflow-y:auto;padding:14px 14px 30px;display:flex;flex-direction:column;gap:0;}

    .section-label{font-size:11px;font-weight:700;letter-spacing:0.07em;text-transform:uppercase;color:var(--text-faint);padding:0 2px;margin:12px 0 8px;}
    .section-label:first-child{margin-top:8px;}

    /* Friend row */
    .friend-row{display:flex;align-items:center;gap:12px;padding:10px 2px;border-bottom:1px solid var(--border);}
    .friend-row:last-child{border-bottom:none;}
    .av{width:44px;height:44px;border-radius:50%;display:flex;align-items:center;justify-content:center;font-size:15px;font-weight:700;color:white;flex-shrink:0;position:relative;}
    .av-dot{width:10px;height:10px;border-radius:50%;position:absolute;bottom:0;right:0;border:2px solid var(--bg);}
    .friend-info{flex:1;min-width:0;}
    .friend-name{font-size:14px;font-weight:600;color:var(--text);}
    .friend-sub{font-size:12px;color:var(--text-muted);margin-top:2px;}
    .rally-badge{font-size:10px;font-weight:700;padding:4px 10px;border-radius:50px;background:rgba(53,94,59,0.2);color:#6dbf77;white-space:nowrap;flex-shrink:0;margin-left:4px;}

    /* Empty state */
    .empty{text-align:center;padding:40px 20px;color:var(--text-faint);font-size:14px;}

    /* Add Friend Modal */
    .modal-overlay{position:fixed;inset:0;background:rgba(0,0,0,0.55);z-index:200;display:flex;align-items:flex-end;opacity:0;pointer-events:none;transition:opacity 0.2s;}
    .modal-overlay.open{opacity:1;pointer-events:all;}
    .modal-sheet{background:var(--bg);border-radius:22px 22px 0 0;padding:20px 20px 36px;width:100%;transform:translateY(100%);transition:transform 0.3s ease;}
    .modal-overlay.open .modal-sheet{transform:translateY(0);}
    .mhandle{width:36px;height:4px;border-radius:2px;background:var(--border);margin:0 auto 18px;}
    .modal-title{font-size:17px;font-weight:700;color:var(--text);margin-bottom:16px;}
    .modal-input{width:100%;background:var(--surface);border:1px solid var(--border);border-radius:12px;padding:12px 14px;font-size:14px;color:var(--text);font-family:inherit;box-sizing:border-box;outline:none;}
    .modal-input:focus{border-color:var(--accent);}
    .mbtn{width:100%;padding:13px;border-radius:50px;border:none;font-size:15px;font-weight:600;cursor:pointer;font-family:inherit;margin-top:10px;transition:all 0.2s;}
    .mbtn.primary{background:var(--accent);color:white;}
    .mbtn.primary:active{opacity:0.85;}
    .mbtn.ghost{background:transparent;border:1px solid var(--border);color:var(--text-muted);}
  </style>
</head>
<body>
<div id="app">
  <div class="header">
    <div class="header-top">
      <a class="back" href="index.html">‹ Back</a>
      <div class="header-title">Friends</div>
      <div class="header-actions">
        <button class="add-btn" onclick="openModal('add-modal')">+ Add</button>
      </div>
    </div>
    <div class="search-bar">
      <svg width="15" height="15" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2.5" stroke-linecap="round" stroke-linejoin="round" style="color:var(--text-faint);flex-shrink:0"><circle cx="11" cy="11" r="8"/><line x1="21" y1="21" x2="16.65" y2="16.65"/></svg>
      <input id="search-input" type="text" placeholder="Search friends…" oninput="render()">
    </div>
  </div>

  <div class="content" id="content"></div>

  <!-- Add Friend Modal -->
  <div class="modal-overlay" id="add-modal">
    <div class="modal-sheet">
      <div class="mhandle"></div>
      <div class="modal-title">Add a Friend</div>
      <input class="modal-input" id="add-input" type="text" placeholder="Name or username…">
      <button class="mbtn primary" onclick="addFriend()">Send Friend Request</button>
      <button class="mbtn ghost" onclick="closeModal('add-modal')">Cancel</button>
    </div>
  </div>

  <div class="toast" id="toastEl">
    <div id="tic" style="font-size:20px">✅</div>
    <div><div id="tt" style="font-size:13px;font-weight:600;color:var(--text)"></div><div id="ts" style="font-size:11px;color:var(--text-muted);margin-top:2px"></div></div>
  </div>
</div>

<script src="js/utils.js"></script>
<script>
// Simulated friends list
const FRIENDS = [
  {id:'collin',  name:'Collin Chan',     ini:'CC', color:'#355E3B', lastSeen:'2 min ago',  online:true},
  {id:'jordan',  name:'Jordan Kim',      ini:'JK', color:'#2d6a4f', lastSeen:'just now',   online:true},
  {id:'maya',    name:'Maya Rodriguez',  ini:'MR', color:'#1b4332', lastSeen:'1 min ago',  online:true},
  {id:'richard', name:'Richard Do',      ini:'RD', color:'#40916c', lastSeen:'just now',   online:true},
  {id:'priya',   name:'Priya Patel',     ini:'PP', color:'#52b788', lastSeen:'10 min ago', online:false},
  {id:'sam',     name:'Sam Torres',      ini:'ST', color:'#74c69d', lastSeen:'1 hr ago',   online:false},
];

// IDs of friends currently in the active rally session (mock — in reality from session state)
const RALLY_FRIENDS = new Set(['collin','jordan']);

// Check if a rally is active (read from localStorage or default to true for demo)
const RALLY_ACTIVE = localStorage.getItem('rallyActive') !== 'false';

function render() {
  const query = (document.getElementById('search-input').value || '').toLowerCase().trim();
  const filtered = FRIENDS.filter(f => f.name.toLowerCase().includes(query));

  const rallyGroup  = RALLY_ACTIVE ? filtered.filter(f => RALLY_FRIENDS.has(f.id)) : [];
  const othersGroup = filtered.filter(f => !RALLY_FRIENDS.has(f.id) || !RALLY_ACTIVE);

  const container = document.getElementById('content');
  container.innerHTML = '';

  if (filtered.length === 0) {
    container.innerHTML = '<div class="empty">No friends found</div>';
    return;
  }

  if (rallyGroup.length > 0) {
    const label = document.createElement('div');
    label.className = 'section-label';
    label.textContent = 'In Your Rally';
    container.appendChild(label);
    rallyGroup.forEach(f => container.appendChild(makeFriendRow(f, true)));
  }

  if (othersGroup.length > 0) {
    if (rallyGroup.length > 0) {
      const label = document.createElement('div');
      label.className = 'section-label';
      label.textContent = 'Friends';
      container.appendChild(label);
    }
    othersGroup.forEach(f => container.appendChild(makeFriendRow(f, false)));
  }
}

function makeFriendRow(f, inRally) {
  const row = document.createElement('div');
  row.className = 'friend-row';
  row.innerHTML = `
    <div class="av" style="background:${f.color}">
      ${f.ini}
      <div class="av-dot" style="background:${f.online ? '#10b981' : '#6b7280'}"></div>
    </div>
    <div class="friend-info">
      <div class="friend-name">${f.name}</div>
      <div class="friend-sub">${f.online ? 'Active now' : 'Last seen ' + f.lastSeen}</div>
    </div>
    ${inRally ? '<div class="rally-badge">In your rally</div>' : ''}
  `;
  return row;
}

function addFriend() {
  const input = document.getElementById('add-input');
  const name = input.value.trim();
  if (!name) return;
  closeModal('add-modal');
  input.value = '';
  toast('✉️', 'Friend request sent', `Request sent to "${name}"`);
}

function openModal(id)  { document.getElementById(id).classList.add('open'); }
function closeModal(id) { document.getElementById(id).classList.remove('open'); }

// Close modal on backdrop tap
document.getElementById('add-modal').addEventListener('click', function(e) {
  if (e.target === this) closeModal('add-modal');
});

render();
</script>
</body>
</html>
