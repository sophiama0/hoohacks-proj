<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0, user-scalable=no">
  <title>Rally — Profile</title>
  <link rel="stylesheet" href="css/shared.css">
  <style>
    .content{position:absolute;top:104px;bottom:0;left:0;right:0;overflow-y:auto;padding:24px 28px 48px;}

    /* Avatar */
    .avatar-section{display:flex;flex-direction:column;align-items:center;gap:12px;padding:8px 0 28px;}
    .avatar-wrap{position:relative;cursor:pointer;}
    .avatar{width:88px;height:88px;border-radius:50%;background:var(--primary);display:flex;align-items:center;justify-content:center;font-size:32px;font-weight:700;color:white;border:3px solid rgba(53,94,59,0.4);box-shadow:0 0 24px rgba(53,94,59,0.3);overflow:hidden;}
    .avatar img{width:100%;height:100%;object-fit:cover;}
    .avatar-badge{position:absolute;bottom:2px;right:2px;width:26px;height:26px;background:#1a1a28;border:2px solid var(--bg);border-radius:50%;display:flex;align-items:center;justify-content:center;font-size:12px;}
    .avatar-name{font-size:18px;font-weight:700;color:var(--text);}
    .avatar-email{font-size:12px;color:var(--text-muted);}
    #photo-input{display:none;}

    /* Section divider label */
    .divider-label{font-size:10px;font-weight:600;color:var(--text-faint);text-transform:uppercase;letter-spacing:1px;margin:4px 0 16px;}

    /* Toggle row */
    .toggle-row{display:flex;align-items:center;justify-content:space-between;padding:12px 0;border-bottom:1px solid rgba(255,255,255,0.05);}
    .toggle-row:last-child{border-bottom:none;}
    .toggle-label{font-size:14px;color:var(--text);}
    .toggle-sub{font-size:11px;color:var(--text-muted);margin-top:1px;}
    .toggle{width:44px;height:24px;border-radius:12px;background:rgba(255,255,255,0.1);border:none;cursor:pointer;position:relative;transition:background 0.25s;flex-shrink:0;}
    .toggle.on{background:var(--primary);}
    .toggle::after{content:'';position:absolute;top:3px;left:3px;width:18px;height:18px;border-radius:50%;background:white;transition:transform 0.25s;box-shadow:0 1px 4px rgba(0,0,0,0.3);}
    .toggle.on::after{transform:translateX(20px);}

    /* Sign out */
    .sign-out-btn{width:100%;padding:14px;border:none;border-radius:50px;font-size:14px;font-weight:700;cursor:pointer;font-family:inherit;background:rgba(239,68,68,0.1);color:#f87171;border:1px solid rgba(239,68,68,0.25);transition:all 0.2s;margin-top:8px;}
    .sign-out-btn:hover{background:rgba(239,68,68,0.18);}

    /* Save button in header */
    .save-btn{font-size:13px;font-weight:700;color:var(--primary);background:none;border:none;cursor:pointer;font-family:inherit;padding:4px 2px;}
    .save-btn:hover{opacity:0.8;}
  </style>
</head>
<body>
<div id="app">
  <div class="header">
    <div class="header-top">
      <a class="back" href="index.html">‹ Back</a>
      <div class="header-title">Profile</div>
      <button class="save-btn" onclick="saveProfile()">Save</button>
    </div>
  </div>

  <div class="content">

    <!-- Avatar -->
    <div class="avatar-section">
      <div class="avatar-wrap" onclick="document.getElementById('photo-input').click()">
        <div class="avatar" id="avatar-display">
          <span id="avatar-initials">?</span>
        </div>
        <div class="avatar-badge"></div>
      </div>
      <input type="file" id="photo-input" accept="image/*" onchange="handlePhoto(event)">
      <div class="avatar-name" id="display-name">Your Name</div>
      <div class="avatar-email" id="display-email">email@example.com</div>
    </div>

    <!-- Personal Info -->
    <div class="divider-label">Your Info</div>
    <div class="input-group">
      <label class="input-label" for="name">Full Name</label>
      <input class="input" id="name" type="text" placeholder="Your name">
    </div>
    <div class="input-group">
      <label class="input-label" for="email">Email</label>
      <input class="input" id="email" type="email" placeholder="you@example.com">
    </div>
    <div class="input-group">
      <label class="input-label" for="phone">Phone Number</label>
      <input class="input" id="phone" type="tel" placeholder="(555) 123-4567">
    </div>

    <!-- Emergency Contact -->
    <div class="divider-label" style="margin-top:8px">Emergency Contact</div>
    <div class="input-group">
      <label class="input-label" for="ec-name">Emergency Contact Name</label>
      <input class="input" id="ec-name" type="text" placeholder="e.g. Mom, Dad">
    </div>
    <div class="input-group">
      <label class="input-label" for="ec-phone">Emergency Contact Number</label>
      <input class="input" id="ec-phone" type="tel" placeholder="(555) 867-5309">
    </div>

    <!-- Security -->
    <div class="divider-label" style="margin-top:8px">Security</div>
    <div class="input-group">
      <label class="input-label" for="current-pw">Current Password</label>
      <input class="input" id="current-pw" type="password" placeholder="••••••••">
    </div>
    <div class="input-group">
      <label class="input-label" for="new-pw">New Password</label>
      <input class="input" id="new-pw" type="password" placeholder="Min. 8 characters">
    </div>
    <div class="input-group">
      <label class="input-label" for="confirm-pw">Confirm New Password</label>
      <input class="input" id="confirm-pw" type="password" placeholder="••••••••">
    </div>

    <!-- Notifications -->
    <div class="divider-label" style="margin-top:8px">Notifications</div>
    <div class="toggle-row">
      <div class="toggle-label">Alerts from Friends</div>
      <button class="toggle on" id="notif-gait" onclick="this.classList.toggle('on')"></button>
    </div>
    <div class="toggle-row">
      <div class="toggle-label">Safe place arrivals</div>
      <button class="toggle on" id="notif-safe" onclick="this.classList.toggle('on')"></button>
    </div>
    <div class="toggle-row">
      <div class="toggle-label">Hydration reminders</div>
      <button class="toggle on" id="notif-water" onclick="this.classList.toggle('on')"></button>
    </div>
    <div class="toggle-row">
      <div class="toggle-label">Low battery warnings</div>
      <button class="toggle" id="notif-batt" onclick="this.classList.toggle('on')"></button>
    </div>

    <!-- Sign out -->
    <button class="sign-out-btn" onclick="signOut()">Sign Out</button>

  </div>

  <div class="toast" id="toastEl">
    <div id="tic" style="font-size:20px"></div>
    <div><div id="tt" style="font-size:13px;font-weight:600;color:var(--text)"></div><div id="ts" style="font-size:11px;color:var(--text-muted);margin-top:2px"></div></div>
  </div>
</div>

<script src="js/utils.js"></script>
<script>
let user = JSON.parse(localStorage.getItem('rally_user') || 'null');
if(!user) window.location.href='login.html';

function initials(name){ return name ? name.split(' ').map(w=>w[0]).join('').slice(0,2).toUpperCase() : '?'; }

function loadProfile(){
  if(!user) return;
  document.getElementById('name').value        = user.name  || '';
  document.getElementById('email').value       = user.email || '';
  document.getElementById('phone').value       = user.phone || '';
  document.getElementById('ec-name').value     = user.emergencyContact?.name  || '';
  document.getElementById('ec-phone').value    = user.emergencyContact?.phone || '';
  document.getElementById('display-name').textContent  = user.name  || 'Your Name';
  document.getElementById('display-email').textContent = user.email || 'email@example.com';

  const av = document.getElementById('avatar-display');
  if(user.avatar){
    av.innerHTML = `<img src="${user.avatar}" alt="avatar">`;
  } else {
    document.getElementById('avatar-initials').textContent = initials(user.name);
  }

  // Live preview as name is typed
  document.getElementById('name').addEventListener('input', e=>{
    const v = e.target.value.trim();
    document.getElementById('display-name').textContent = v || 'Your Name';
    if(!user.avatar) document.getElementById('avatar-initials').textContent = initials(v);
  });
}

function handlePhoto(e){
  const file = e.target.files[0];
  if(!file) return;
  const reader = new FileReader();
  reader.onload = ev=>{
    const src = ev.target.result;
    document.getElementById('avatar-display').innerHTML = `<img src="${src}" alt="avatar">`;
    user.avatar = src;
  };
  reader.readAsDataURL(file);
}

function saveProfile(){
  const currentPw = document.getElementById('current-pw').value;
  const newPw     = document.getElementById('new-pw').value;
  const confirmPw = document.getElementById('confirm-pw').value;

  if(newPw){
    if(currentPw !== user.password){ toast('','Wrong current password','Please enter your existing password'); return; }
    if(newPw.length < 8){ toast('','Password too short','Minimum 8 characters required'); return; }
    if(newPw !== confirmPw){ toast('','Passwords don\'t match','New passwords must match'); return; }
    user.password = newPw;
    document.getElementById('current-pw').value = '';
    document.getElementById('new-pw').value = '';
    document.getElementById('confirm-pw').value = '';
  }

  user.name  = document.getElementById('name').value.trim();
  user.email = document.getElementById('email').value.trim();
  user.phone = document.getElementById('phone').value.trim();
  user.emergencyContact = {
    name:  document.getElementById('ec-name').value.trim(),
    phone: document.getElementById('ec-phone').value.trim(),
  };

  localStorage.setItem('rally_user', JSON.stringify(user));
  document.getElementById('display-name').textContent  = user.name  || 'Your Name';
  document.getElementById('display-email').textContent = user.email || '';
  toast('','Profile saved','Your changes have been saved');
}

function signOut(){
  localStorage.removeItem('rally_user');
  window.location.href='login.html';
}

loadProfile();
</script>
</body>
</html>
