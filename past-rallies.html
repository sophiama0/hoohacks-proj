<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0, user-scalable=no">
  <title>Rally — Past Rallies</title>
  <link rel="stylesheet" href="css/shared.css">
  <style>
    .header-sub{font-size:12px;color:var(--text-muted);margin-top:3px;}
    .content{position:absolute;top:88px;bottom:0;left:0;right:0;overflow-y:auto;padding:14px 14px 32px;display:flex;flex-direction:column;gap:10px;}

    .rally-card{background:var(--surface);border:1px solid var(--border);border-radius:18px;overflow:hidden;cursor:pointer;transition:border-color 0.2s;}
    .rally-card.open{border-color:rgba(53,94,59,0.4);}
    .rally-card-header{padding:14px 16px;display:flex;align-items:center;gap:12px;}
    .rally-date-badge{width:44px;flex-shrink:0;text-align:center;background:rgba(53,94,59,0.15);border:1px solid rgba(53,94,59,0.25);border-radius:10px;padding:6px 4px;}
    .rally-date-month{font-size:9px;font-weight:700;color:#7ab880;text-transform:uppercase;letter-spacing:0.5px;}
    .rally-date-day{font-size:20px;font-weight:800;color:var(--text);line-height:1.1;}
    .rally-info{flex:1;min-width:0;}
    .rally-title{font-size:14px;font-weight:700;color:var(--text);}
    .rally-meta{font-size:11px;color:var(--text-muted);margin-top:3px;display:flex;align-items:center;gap:6px;}
    .rally-meta-dot{width:3px;height:3px;border-radius:50%;background:var(--text-faint);}
    .rally-status{flex-shrink:0;display:flex;flex-direction:column;align-items:flex-end;gap:4px;}
    .status-pill{font-size:10px;font-weight:600;padding:3px 8px;border-radius:50px;}
    .status-safe{background:rgba(16,185,129,0.15);color:#34d399;border:1px solid rgba(16,185,129,0.25);}
    .status-incident{background:rgba(239,68,68,0.12);color:#f87171;border:1px solid rgba(239,68,68,0.2);}
    .rally-chevron{color:var(--text-faint);transition:transform 0.25s;}
    .rally-card.open .rally-chevron{transform:rotate(90deg);}

    .rally-friends{display:flex;gap:-4px;}
    .rally-avatar{width:20px;height:20px;border-radius:50%;border:1.5px solid var(--bg);display:flex;align-items:center;justify-content:center;font-size:8px;font-weight:700;color:white;margin-left:-4px;}
    .rally-avatar:first-child{margin-left:0;}

    /* Expanded stats */
    .rally-expand{display:none;border-top:1px solid var(--border);padding:14px 16px 16px;}
    .rally-card.open .rally-expand{display:block;}
    .stat-row{display:grid;grid-template-columns:1fr 1fr 1fr;gap:8px;margin-bottom:12px;}
    .mini-stat{background:rgba(255,255,255,0.04);border-radius:11px;padding:10px 8px;text-align:center;}
    .mini-stat-val{font-size:16px;font-weight:800;color:var(--text);letter-spacing:-0.3px;}
    .mini-stat-lbl{font-size:9px;color:var(--text-muted);margin-top:2px;line-height:1.3;}
    .venues-row{display:flex;flex-wrap:wrap;gap:6px;margin-bottom:12px;}
    .venue-chip{font-size:11px;color:var(--text-muted);background:rgba(255,255,255,0.05);border:1px solid var(--border);border-radius:50px;padding:4px 10px;}
    .friends-expand-row{display:flex;gap:6px;flex-wrap:wrap;}
    .friend-chip-mini{display:flex;align-items:center;gap:5px;background:rgba(255,255,255,0.05);border:1px solid var(--border);border-radius:50px;padding:4px 10px;}
    .friend-chip-dot{width:7px;height:7px;border-radius:50%;flex-shrink:0;}
    .friend-chip-name{font-size:11px;color:var(--text-muted);}
    .expand-link{display:flex;align-items:center;justify-content:center;gap:5px;font-size:12px;font-weight:600;color:#7ab880;text-decoration:none;margin-top:4px;}
  </style>
</head>
<body>
<div id="app">
  <div class="header">
    <div class="header-top">
      <a class="back" href="night-summary.html">‹ Back</a>
      <div class="header-title">Past Rallies</div>
      <div style="width:48px;"></div>
    </div>
  </div>

  <div class="content" id="rallyList"></div>
</div>

<script>
const RALLIES = [
  {
    month:'Mar', day:21, year:2026, dayName:'Saturday',
    duration:'4h 30m', venues:['The Corner','Boylan Heights','Boylan Heights Rooftop'],
    friends:[{name:'Alex',ini:'AC',color:'#ef4444'},{name:'Jordan',ini:'JK',color:'#f59e0b'},{name:'Maya',ini:'MR',color:'#10b981'},{name:'Sam',ini:'ST',color:'#3b82f6'},{name:'Sophie',ini:'S',color:'#355E3B'}],
    allSafe:true, alerts:4, peakGait:87, maxSep:'0.3mi', highlights:'link',
  },
  {
    month:'Mar', day:14, year:2026, dayName:'Saturday',
    duration:'3h 15m', venues:['Rugby Road','Barracks Row'],
    friends:[{name:'Jordan',ini:'JK',color:'#f59e0b'},{name:'Maya',ini:'MR',color:'#10b981'},{name:'Sam',ini:'ST',color:'#3b82f6'}],
    allSafe:true, alerts:1, peakGait:64, maxSep:'0.1mi',
  },
  {
    month:'Mar', day:7, year:2026, dayName:'Saturday',
    duration:'5h 00m', venues:['The Corner','Trinity Irish Pub','Bodo\'s Bagels'],
    friends:[{name:'Alex',ini:'AC',color:'#ef4444'},{name:'Jordan',ini:'JK',color:'#f59e0b'},{name:'Maya',ini:'MR',color:'#10b981'},{name:'Sophie',ini:'S',color:'#355E3B'}],
    allSafe:false, alerts:7, peakGait:91, maxSep:'0.6mi',
  },
  {
    month:'Feb', day:28, year:2026, dayName:'Saturday',
    duration:'2h 45m', venues:['Boylan Heights'],
    friends:[{name:'Alex',ini:'AC',color:'#ef4444'},{name:'Sam',ini:'ST',color:'#3b82f6'},{name:'Sophie',ini:'S',color:'#355E3B'}],
    allSafe:true, alerts:0, peakGait:42, maxSep:'0.05mi',
  },
  {
    month:'Feb', day:21, year:2026, dayName:'Saturday',
    duration:'4h 10m', venues:['The Corner','Rugby Road','Bodo\'s Bagels'],
    friends:[{name:'Alex',ini:'AC',color:'#ef4444'},{name:'Jordan',ini:'JK',color:'#f59e0b'},{name:'Maya',ini:'MR',color:'#10b981'},{name:'Sam',ini:'ST',color:'#3b82f6'},{name:'Sophie',ini:'S',color:'#355E3B'}],
    allSafe:true, alerts:3, peakGait:78, maxSep:'0.4mi',
  },
  {
    month:'Feb', day:14, year:2026, dayName:'Saturday',
    duration:'3h 30m', venues:['The Corner','Trinity Irish Pub'],
    friends:[{name:'Jordan',ini:'JK',color:'#f59e0b'},{name:'Maya',ini:'MR',color:'#10b981'},{name:'Sophie',ini:'S',color:'#355E3B'}],
    allSafe:true, alerts:2, peakGait:69, maxSep:'0.2mi',
  },
  {
    month:'Feb', day:7, year:2026, dayName:'Saturday',
    duration:'4h 50m', venues:['Barracks Row','Rugby Road','The Corner'],
    friends:[{name:'Alex',ini:'AC',color:'#ef4444'},{name:'Jordan',ini:'JK',color:'#f59e0b'},{name:'Sam',ini:'ST',color:'#3b82f6'}],
    allSafe:false, alerts:5, peakGait:93, maxSep:'0.8mi',
  },
  {
    month:'Jan', day:31, year:2026, dayName:'Saturday',
    duration:'3h 00m', venues:['Boylan Heights','The Corner'],
    friends:[{name:'Maya',ini:'MR',color:'#10b981'},{name:'Sam',ini:'ST',color:'#3b82f6'},{name:'Sophie',ini:'S',color:'#355E3B'}],
    allSafe:true, alerts:1, peakGait:55, maxSep:'0.15mi',
  },
  {
    month:'Jan', day:24, year:2026, dayName:'Saturday',
    duration:'2h 20m', venues:['Bodo\'s Bagels'],
    friends:[{name:'Alex',ini:'AC',color:'#ef4444'},{name:'Jordan',ini:'JK',color:'#f59e0b'},{name:'Sophie',ini:'S',color:'#355E3B'}],
    allSafe:true, alerts:0, peakGait:38, maxSep:'0.05mi',
  },
  {
    month:'Jan', day:17, year:2026, dayName:'Saturday',
    duration:'5h 15m', venues:['The Corner','Trinity Irish Pub','Rugby Road','Boylan Heights'],
    friends:[{name:'Alex',ini:'AC',color:'#ef4444'},{name:'Jordan',ini:'JK',color:'#f59e0b'},{name:'Maya',ini:'MR',color:'#10b981'},{name:'Sam',ini:'ST',color:'#3b82f6'},{name:'Sophie',ini:'S',color:'#355E3B'}],
    allSafe:true, alerts:6, peakGait:85, maxSep:'0.5mi',
  },
];

function gaitColor(g){
  return g>=90?'#ef4444':g>=75?'#f97316':g>=55?'#f59e0b':'#10b981';
}

function buildCard(r, idx){
  const isFirst = idx === 0;
  const venueStr = r.venues.join(' · ');
  const avatars = r.friends.slice(0,5).map(f=>
    `<div class="rally-avatar" style="background:${f.color}">${f.ini}</div>`
  ).join('');
  const extraFriends = r.friends.length > 5 ? `<span style="font-size:10px;color:var(--text-muted);margin-left:4px;">+${r.friends.length-5}</span>` : '';

  const statusPill = r.allSafe
    ? `<div class="status-pill status-safe">All safe</div>`
    : `<div class="status-pill status-incident">Incident</div>`;

  const friendChips = r.friends.map(f=>
    `<div class="friend-chip-mini"><div class="friend-chip-dot" style="background:${f.color}"></div><span class="friend-chip-name">${f.name}</span></div>`
  ).join('');

  const venueChips = r.venues.map(v=>
    `<div class="venue-chip">${v}</div>`
  ).join('');

  const viewLink = isFirst
    ? `<a class="expand-link" href="night-summary.html">View full summary ›</a>`
    : '';

  const alertsColor = r.alerts === 0 ? 'var(--safe)' : r.alerts >= 5 ? 'var(--danger)' : 'var(--warning)';
  const gc = gaitColor(r.peakGait);

  return `
  <div class="rally-card${isFirst?' open':''}" onclick="toggleCard(this)">
    <div class="rally-card-header">
      <div class="rally-date-badge">
        <div class="rally-date-month">${r.month}</div>
        <div class="rally-date-day">${r.day}</div>
      </div>
      <div class="rally-info">
        <div class="rally-title">${r.dayName} Night</div>
        <div class="rally-meta">
          <span>${r.duration}</span>
          <div class="rally-meta-dot"></div>
          <span>${r.friends.length} friends</span>
          <div class="rally-meta-dot"></div>
          <span>${r.venues.length} venue${r.venues.length!==1?'s':''}</span>
        </div>
      </div>
      <div class="rally-status">
        ${statusPill}
        <div style="display:flex;align-items:center;margin-top:2px;">
          <div class="rally-friends">${avatars}</div>${extraFriends}
        </div>
      </div>
      <svg class="rally-chevron" width="14" height="14" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2.5" stroke-linecap="round" stroke-linejoin="round"><polyline points="9 18 15 12 9 6"/></svg>
    </div>
    <div class="rally-expand">
      <div class="stat-row">
        <div class="mini-stat">
          <div class="mini-stat-val" style="color:${gc}">${r.peakGait}%</div>
          <div class="mini-stat-lbl">Peak gait index</div>
        </div>
        <div class="mini-stat">
          <div class="mini-stat-val" style="color:${alertsColor}">${r.alerts}</div>
          <div class="mini-stat-lbl">Alerts sent</div>
        </div>
        <div class="mini-stat">
          <div class="mini-stat-val">${r.maxSep}</div>
          <div class="mini-stat-lbl">Max separation</div>
        </div>
      </div>
      <div style="font-size:10px;font-weight:600;color:var(--text-muted);text-transform:uppercase;letter-spacing:0.8px;margin-bottom:7px;">Venues</div>
      <div class="venues-row">${venueChips}</div>
      <div style="font-size:10px;font-weight:600;color:var(--text-muted);text-transform:uppercase;letter-spacing:0.8px;margin-bottom:7px;">Friends</div>
      <div class="friends-expand-row">${friendChips}</div>
      ${viewLink}
    </div>
  </div>`;
}

function toggleCard(el){
  el.classList.toggle('open');
}

document.getElementById('rallyList').innerHTML = RALLIES.map((r,i)=>buildCard(r,i)).join('');
</script>
</body>
</html>
